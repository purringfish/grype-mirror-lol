name: mirror-grype-db
# Раз в день качает свежую базу grype с anchore и обновляет оба зеркала
# (GitHub-релиз + GitVerse-пакет). Запускается по расписанию и кнопкой вручную.

on:
  schedule:
    - cron: '0 21 * * *'     # каждый день в 21:00 UTC = 00:00 МСК (UTC+3)
  workflow_dispatch: {}       # кнопка "Run workflow" во вкладке Actions

permissions:
  contents: write             # нужно, чтобы github-grype-mirror.sh мог
                              # создавать релиз и коммитить latest.json через GITHUB_TOKEN

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: GitHub mirror
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}    # встроенный токен, отдельный PAT не нужен
        run: |
          chmod +x github-grype-mirror.sh
          ./github-grype-mirror.sh

      - name: GitVerse mirror
        env:
          GV_TOKEN: ${{ secrets.GV_TOKEN }}     # токен GitVerse (нужен git push в репозиторий)
          GV_OWNER: ${{ secrets.GV_OWNER }}     # ник GitVerse
          GV_REPO:  ${{ secrets.GV_REPO }}      # репозиторий GitVerse (база пушится в ветку db)
        run: |
          chmod +x gitverse-grype-mirror.sh
          ./gitverse-grype-mirror.sh
